  /vehicles/{licensePlateNo}/location-pings:
    get:
      tags: [Vehicles]
      summary: Get historical movement log for a vehicle (time-window query)
      description: |
        Core brief deliverable  historical movement log.
        Requires location:view_history permission.
        Results ordered by ping_timestamp DESC.
        Uses the composite index idx_location_pings_device_time and BRIN index
        idx_location_pings_timestamp_brin for efficient time-window scans.
        Default window: last 24 hours. Maximum window: 30 days.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            example: "TUK-0001"
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated movement history
          content:
            application/json:
              schema:
                type: object
                properties:
                  license_plate_no:
                    type: string
                    example: "TUK-0001"
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LocationPing'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '400':
          description: Invalid time window (exceeds 30 days or bad format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/{licensePlateNo}/last-location:
    get:
      tags: [Vehicles]
      summary: Get the last known GPS location of a vehicle (live view)
      description: |
        Core brief deliverable  live view.
        Returns the single most recent location ping for the vehicle's active device.
        Includes a minutes_since_last_ping staleness indicator.
        Requires location:view_live permission.
        Uses idx_location_pings_device_time composite index for O(1) lookup.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            example: "TUK-0001"
      responses:
        '200':
          description: Last known location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastLocation'
              example:
                vehicle_id: "ddfaec62-d11b-5939-beff-96ffaeb5b099"
                license_plate_no: "TUK-0001"
                device_id: "a1345168-cf7b-5624-8889-a447df42141b"
                device_serial_no: "SLPGPS000001"
                latitude: 7.6808590
                longitude: 80.3892932
                ping_timestamp: "2026-05-03T08:30:00Z"
                speed_kmh: 23.5
                device_battery: 85
                minutes_since_last_ping: 2.3
        '404':
          description: Vehicle has no device assigned or no pings on record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

