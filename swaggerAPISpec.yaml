                    type: array
                    items:
                      $ref: '#/components/schemas/Driver'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Drivers]
      summary: Register a new driver
      description: Requires driver:create. PII fields encrypted before DB insert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverCreate'
            example:
              driver_fullname: "Kasun Jayawardena"
              driver_identity_no: "852345678V"
              driver_id_type: "NIC"
              date_of_birth: "1985-07-15"
              driver_gender: "MALE"
              driver_contact_no: "+94771234567"
              address: "45, Main Street, Galle"
              driver_license_no: "B9876543"
              license_expiry_date: "2028-06-30"
      responses:
        '201':
          description: Driver registered
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /drivers/{driverLicenseNo}:
    get:
      tags: [Drivers]
      summary: Get a driver by driving licence number
      description: |
        Requires driver:view. The service performs an HMAC-SHA256 blind-index lookup
        against driver_license_no_hmac — the plain-text licence number is never
        used as a query predicate against the encrypted column directly.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          description: Plain-text driving licence number (e.g. B1234567)
          schema:
            type: string
            example: "B1234567"
      responses:
        '200':
          description: Driver detail (PII decrypted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Drivers]
      summary: Update a driver by driving licence number
      description: Requires driver:edit permission.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            example: "B1234567"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverUpdate'
      responses:
        '200':
          description: Driver updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Drivers]
      summary: Suspend a driver by driving licence number (soft delete  home jurisdiction only)
      description: Requires driver:delete. Sets status to SUSPENDED. Physical row is never deleted.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            example: "B1234567"
      responses:
        '200':
          description: Driver suspended
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Driver suspended successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /drivers/{driverLicenseNo}/change-status:
    post:
      tags: [Drivers]
      summary: Explicitly transition driver status (ACTIVE / SUSPENDED / BLACKLISTED)
      description: Requires driver:change_status permission. BLACKLISTED requires admin action and permanently bars the driver.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            example: "B1234567"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDriverStatusRequest'
            example:
              status: "BLACKLISTED"
      responses:
        '200':
          description: Driver status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── ASSIGNMENTS (CONTROLLER RESOURCES) ───────────────────────────────────────
  /assign-driver:
    post:
      tags: [Assignments]
      summary: Assign a driver to a vehicle (atomic controller resource)
      description: |
        **Atomic DB transaction:**
        1. Closes any existing active assignment for the vehicle
           (unassigned_time = NOW(), is_current_driver = FALSE)
        2. Creates a new active assignment row

        The partial unique index idx_vehicle_driver_assignments_one_active
        enforces only ONE active assignment per vehicle at any time.
        Requires assignment:create permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDriverRequest'
            example:
              license_plate_no: "TUK-0001"
              driver_license_no: "B1234567"
              is_driver_owner: false
      responses:
        '201':
          description: Driver assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vehicle or driver not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Driver already has an active assignment on another vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /unassign-driver:
    post:
      tags: [Assignments]
      summary: Unassign the current driver from a vehicle (controller resource)
      description: |
        Closes the active assignment (unassigned_time = NOW(), is_current_driver = FALSE).
        Physical row is never deleted — full temporal history is preserved.
        Requires assignment:close permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnassignDriverRequest'
            example:
              license_plate_no: "TUK-0001"
      responses:
        '200':
          description: Driver unassigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vehicle not found or no active assignment exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assign-device:
    post:
      tags: [Assignments]
      summary: Assign a tracking device to a vehicle (controller resource)
      description: |
        Sets vehicles.device_id to the resolved device UUID.
        Validates that the device is ACTIVE and not already assigned to another vehicle.
        Requires device:assign_to_vehicle permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDeviceRequest'
            example:
              license_plate_no: "TUK-0001"
              device_serial_no: "SLPGPS000001"
      responses:
        '200':
          description: Device assigned to vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vehicle or device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Device already assigned to another vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── LOCATION PINGS ────────────────────────────────────────────────────────────
  /location-pings:
    security:
        - BearerAuth: []
        - DeviceTokenAuth: []
    post:
      tags: [Location Pings]
      summary: Submit a GPS location ping from a tracking device
      description: |
        **Device-to-server ingest endpoint.**

        This is the only endpoint in the location-pings resource.
        There are no GET endpoints on this resource — location history and
        live view are accessed via the vehicle sub-routes:
        - GET /vehicles/{licensePlateNo}/location-pings — historical movement log
        - GET /vehicles/{licensePlateNo}/last-location — live view

        Authentication uses Bearer JWT. The service resolves the device by
        device_serial_no and verifies the token using HMAC-SHA256.

        Rules enforced:
        - device_serial_no must exist in tracking_devices
        - Device must have device_status = ACTIVE
        - ping_timestamp must not be in the future
        - Latitude must be in range 5.7  10.0 (Sri Lanka geographic bounds)
        - Longitude must be in range 79.5  82.0 (Sri Lanka geographic bounds)
        - device_battery if provided must be 0100
        - Pings are immutable once inserted (no UPDATE or DELETE ever permitted)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationPingCreate'
            examples:
              moving:
                summary: Device moving at speed (TUK-0001 / SLPGPS000001)
                value:
                  device_serial_no: "SLPGPS000001"
                  latitude: 7.2906
                  longitude: 80.6337
                  ping_timestamp: "2026-05-03T08:30:00+05:30"
                  speed_kmh: 23.5
                  device_battery: 85
              stationary_low_battery:
                summary: Device stationary, low battery
                value:
                  device_serial_no: "SLPGPS000002"
                  latitude: 6.9271
                  longitude: 79.8612
                  ping_timestamp: "2026-05-03T09:00:00+05:30"
                  speed_kmh: 0.0
                  device_battery: 8
              minimal:
                summary: Minimal ping (speed and battery not reported by this device)
                value:
                  device_serial_no: "SLPGPS000003"
                  latitude: 8.3114
                  longitude: 80.4037
                  ping_timestamp: "2026-05-03T09:15:00+05:30"
      responses:
        '201':
          description: Location ping recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationPing'
              example:
                ping_id: "e9b3de45-1b4f-55a3-9b87-875636b28cf1"
                device_id: "a1345168-cf7b-5624-8889-a447df42141b"
                vehicle_id: "ddfaec62-d11b-5939-beff-96ffaeb5b099"
                license_plate_no: "TUK-0001"
                latitude: 7.2906
                longitude: 80.6337
                ping_timestamp: "2026-05-03T08:30:00+05:30"
                speed_kmh: 23.5
                device_battery: 85
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "Validation failed"
                errors:
                  - field: "latitude"
                    message: "Must be between 5.7 and 10.0 (Sri Lanka bounds)"
                  - field: "ping_timestamp"
                    message: "Timestamp cannot be in the future"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Device exists but is not ACTIVE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                message: "Forbidden"
                description: "Device SLPGPS000001 is INACTIVE. Only ACTIVE devices may post pings."
        '404':
          description: device_serial_no not found in tracking_devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'