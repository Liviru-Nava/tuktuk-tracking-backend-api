                  example: [vehicle:view, location:view_live]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Role'
        '403':
          description: Missing audit:view permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # OFFICES
  # ============================================================

  /offices:
    get:
      tags: [Offices]
      summary: List all offices
      description: Jurisdiction-scoped. Supports optional filtering.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, CLOSED]
        - name: office_type
          in: query
          schema:
            type: string
            enum: [HEADQUARTERS, PROVINCIAL_HQ, DISTRICT_HQ, DIVISIONAL_STATION]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Offices retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Office'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Offices]
      summary: Create a new office
      description: Requires office:create permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [office_code, office_name, office_type, jurisdiction_type]
              properties:
                office_code:
                  type: string
                  example: SLP-WP-001
                office_name:
                  type: string
                  example: Colombo District Police HQ
                office_type:
                  type: string
                  enum: [HEADQUARTERS, PROVINCIAL_HQ, DISTRICT_HQ, DIVISIONAL_STATION]
                jurisdiction_type:
                  type: string
                  enum: [NATIONAL, PROVINCIAL, DISTRICT]
                jurisdiction_ref_id:
                  type: string
                  
                  nullable: true
                  description: province_id or district_id depending on jurisdiction_type
                office_address:
                  type: string
                  nullable: true
                office_contact:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Office created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Office'
        '400':
          description: Validation error — missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: office_code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /offices/{officeId}:
    get:
      tags: [Offices]
      summary: Get an office by ID
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Office found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Office'
        '403':
          description: Office outside your jurisdiction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Office not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Offices]
      summary: Update an office
      description: >
        Only office_name, office_address, and office_contact are editable.
        office_type and jurisdiction fields are immutable after creation.
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                office_name:
                  type: string
                office_address:
                  type: string
                office_contact:
                  type: string
      responses:
        '200':
          description: Office updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Office'
        '404':
          description: Office not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Offices]
      summary: Close an office (soft delete)
      description: Transitions status to CLOSED. Does not remove the row.
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Office closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Office already closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /offices/{officeId}/users:
    get:
      tags: [Offices]
      summary: List users assigned to an office
      description: Requires user:view permission.
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            type: string
            
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Users in office retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/User'
        '404':
          description: Office not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # USERS
  # ============================================================

  /users:
    get:
      tags: [Users]
      summary: List all users
      description: Jurisdiction-scoped. Requires user:view.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Users retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/User'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Users]
      summary: Create a new user
      description: Requires user:create. Jurisdiction-scoped — cannot create users outside your scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, fullname, email_address, password, badge_id, office_id, role_id]
              properties:
                username:
                  type: string
                  example: officer.perera
                fullname:
                  type: string
                  example: Pradeep Kamal Perera
                email_address:
                  type: string
                  format: email
                  example: p.perera@police.gov.lk
                password:
                  type: string
                  format: password
                  example: SecurePass123!
                badge_id:
                  type: string
                  example: SLP-67890
                contact_no:
                  type: string
                  nullable: true
                office_id:
                  type: string
                  
                role_id:
                  type: string
                  
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '409':
          description: username, email_address, or badge_id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{badgeId}:
    get:
      tags: [Users]
      summary: Get a user by ID
      parameters:
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update a user
      description: Requires user:edit. username, badge_id are immutable.
      parameters:
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                email_address:
                  type: string
                  format: email
                contact_no:
                  type: string
                office_id:
                  type: string
                  
                role_id:
                  type: string
                  
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Users]
      summary: Deactivate a user (soft delete)
      description: Transitions status to INACTIVE. Requires user:deactivate.
      parameters:
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: User is already inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{badgeId}/reset-password:
    post:
      tags: [Users]
      summary: Admin password reset for a user
      description: Requires user:edit. Sets a new bcrypt-hashed password for the user.
      parameters:
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                new_password:
                  type: string
                  format: password
                  example: NewSecurePass456!
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # OWNERS
  # ============================================================

  /owners:
    get:
      tags: [Owners]
      summary: List all owners
      description: Jurisdiction-scoped. Supports search and status filters.
      parameters:
        - name: search
          in: query
          description: Partial match on owner_fullname (case-insensitive)
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, FLAGGED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Owners retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Owner'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Owners]
      summary: Register a new owner
      description: Requires owner:create. owner_identity_no is encrypted at rest.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_fullname, owner_identity_no, owner_id_type, owner_gender]
              properties:
                owner_fullname:
                  type: string
                  example: Nimal Perera
                owner_identity_no:
                  type: string
                  example: 901234567V
                owner_id_type:
                  type: string
                  enum: [NIC, PASSPORT, BUSINESS]
                owner_gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                owner_contact:
                  type: string
                  nullable: true
                owner_address:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Owner registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Owner'
        '409':
          description: owner_identity_no already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /owners/{ownerIdentityNo}:
    get:
      tags: [Owners]
      summary: Get an owner by ID
      description: Returns decrypted PII fields. Jurisdiction-scoped.
      parameters:
        - name: ownerIdentityNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Owner found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Owner'
        '404':
          description: Owner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Owners]
      summary: Update an owner
      description: owner_identity_no and owner_id_type are immutable. Requires owner:edit.
      parameters:
        - name: ownerIdentityNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner_fullname:
                  type: string
                owner_gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                owner_contact:
                  type: string
                owner_address:
                  type: string
      responses:
        '200':
          description: Owner updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Owner'
        '404':
          description: Owner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Owners]
      summary: Deactivate an owner (soft delete)
      description: >
        Transitions status to INACTIVE. Requires owner:delete.
        Blocked if the owner has any vehicles that are not DEREGISTERED.
      parameters:
        - name: ownerIdentityNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Owner deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Owner still has active vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /owners/{ownerIdentityNo}/vehicles:
    get:
      tags: [Owners]
      summary: List vehicles registered under an owner
      description: Requires vehicle:view permission.
      parameters:
        - name: ownerIdentityNo
          in: path
          required: true
          schema:
            type: string
            
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Owner vehicles retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Vehicle'
        '404':
          description: Owner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # VEHICLES
  # ============================================================

  /vehicles:
    get:
      tags: [Vehicles]
      summary: List all vehicles
      description: Jurisdiction-scoped. Supports multiple query filters.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED, FLAGGED, DEREGISTERED]
        - name: district_id
          in: query
          schema:
            type: string
            
        - name: fuel_type
          in: query
          schema:
            type: string
            enum: [PETROL, CNG, ELECTRIC]
        - name: make_of_vehicle
          in: query
          description: Partial match (case-insensitive)
          schema:
            type: string
        - name: owner_id
          in: query
          schema:
            type: string
            
        - name: is_diplomatic
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Vehicles retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Vehicle'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Vehicles]
      summary: Register a new vehicle
      description: >
        Requires vehicle:create. Jurisdiction-scoped — officer can only register
        vehicles in their district. device_id is always null at creation —
        use POST /assignments/assign-device after registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - owner_id
                - district_id
                - license_plate_no
                - chassis_number
                - engine_number
                - make_of_vehicle
                - model_of_vehicle
                - manufacture_year
                - fuel_type
                - vehicle_reg_date
              properties:
                owner_id:
                  type: string
                  
                district_id:
                  type: string
                  
                license_plate_no:
                  type: string
                  example: WP CAB-1234
                chassis_number:
                  type: string
                  example: MA3FJEB1S00123456
                engine_number:
                  type: string
                  example: K10B1234567
                make_of_vehicle:
                  type: string
                  example: Bajaj
                model_of_vehicle:
                  type: string
                  example: RE 4S
                manufacture_year:
                  type: integer
                  example: 2021
                vehicle_colour:
                  type: string
                  nullable: true
                  example: Yellow
                fuel_type:
                  type: string
                  enum: [PETROL, CNG, ELECTRIC]
                is_diplomatic:
                  type: boolean
                  default: false
                vehicle_reg_date:
                  type: string
                  format: date
                  example: "2021-06-15"
      responses:
        '201':
          description: Vehicle registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Vehicle'
        '409':
          description: license_plate_no, chassis_number, or engine_number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}:
    get:
      tags: [Vehicles]
      summary: Get a vehicle by ID
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Vehicle found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Vehicle'
        '403':
          description: Vehicle outside your jurisdiction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Vehicles]
      summary: Update a vehicle
      description: >
        Requires vehicle:edit. Immutable fields: license_plate_no,
        chassis_number, engine_number, status, device_id.
        Use POST /vehicles/{licensePlateNo}/change-status for status changes.
        Use POST /assignments/assign-device for device changes.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                make_of_vehicle:
                  type: string
                model_of_vehicle:
                  type: string
                vehicle_colour:
                  type: string
                fuel_type:
                  type: string
                  enum: [PETROL, CNG, ELECTRIC]
                is_diplomatic:
                  type: boolean
                vehicle_reg_date:
                  type: string
                  format: date
                owner_id:
                  type: string
                  
                district_id:
                  type: string
                  
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Vehicle'
        '400':
          description: Attempted to update an immutable field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Vehicles]
      summary: Deregister a vehicle (soft delete)
      description: >
        Transitions status to DEREGISTERED. Requires vehicle:delete.
        Blocked if vehicle has an active driver assignment —
        use POST /assignments/unassign-driver first.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Vehicle deregistered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Vehicle has an active driver assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}/profile:
    get:
      tags: [Vehicles]
      summary: Get full vehicle profile
      description: >
        Composite response — vehicle + owner (with decrypted PII)
        + current driver (with decrypted PII, if assigned)
        + device (if assigned). One call replaces multiple lookups.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Full vehicle profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VehicleFullProfile'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}/drivers:
    get:
      tags: [Vehicles]
      summary: Get driver assignment history for a vehicle
      description: >
        Paginated history of all driver assignments — past and present.
        Requires assignment:view. PII fields are decrypted in the response.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Driver assignment history retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/DriverAssignment'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}/assignments/{assignmentId}:
    get:
      tags: [Vehicles]
      summary: Get a specific driver assignment record
      description: Requires assignment:view.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Assignment found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DriverAssignment'
        '404':
          description: Vehicle or assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}/location-pings:
    get:
      tags: [Vehicles]
      summary: Get location history for a vehicle
      description: >
        Paginated GPS movement history. Pings are fetched via the
        device currently assigned to the vehicle.
        Returns 404 if the vehicle has no tracking device assigned.
        Supports optional time-window filtering. Core brief deliverable.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
        - name: start_time
          in: query
          description: ISO 8601 datetime — lower bound of time window
          schema:
            type: string
            format: date-time
            example: "2025-04-19T00:00:00Z"
        - name: end_time
          in: query
          description: ISO 8601 datetime — upper bound of time window
          schema:
            type: string
            format: date-time
            example: "2025-04-26T23:59:59Z"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Location history retrieved (newest ping first)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/LocationPing'
        '404':
          description: Vehicle not found, or vehicle has no tracking device assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}/last-location:
    get:
      tags: [Vehicles]
      summary: Get the last known location of a vehicle
      description: >
        Returns only the single most recent GPS ping for this vehicle —
        the live view. Requires location:view_live.
        Returns 404 if the vehicle has no device or has never sent a ping.
        Core brief deliverable.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Last known location retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LastLocationResponse'
        '404':
          description: Vehicle not found, no device assigned, or no pings recorded yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{licensePlateNo}/change-status:
    post:
      tags: [Vehicles]
      summary: Change vehicle status
      description: >
        Transitions vehicle to ACTIVE, SUSPENDED, or FLAGGED.
        DEREGISTERED is handled by DELETE /vehicles/{licensePlateNo}.
        Requires vehicle:change_status.
      parameters:
        - name: licensePlateNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ACTIVE, SUSPENDED, FLAGGED]
      responses:
        '200':
          description: Vehicle status changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Vehicle'
        '409':
          description: Vehicle already has that status, or is DEREGISTERED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # DRIVERS
  # ============================================================

  /drivers:
    get:
      tags: [Drivers]
      summary: List all drivers
      description: Jurisdiction-scoped. Supports search and status filters.
      parameters:
        - name: search
          in: query
          description: Partial match on driver_fullname (case-insensitive)
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED, BLACKLISTED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Drivers retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Driver'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Drivers]
      summary: Register a new driver
      description: Requires driver:create. PII fields are encrypted at rest.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - driver_fullname
                - driver_identity_no
                - driver_id_type
                - date_of_birth
                - driver_gender
                - driver_license_no
                - license_expiry_date
              properties:
                driver_fullname:
                  type: string
                  example: Sunil Rathnayake
                driver_identity_no:
                  type: string
                  example: 851234567V
                driver_id_type:
                  type: string
                  enum: [NIC, PASSPORT]
                date_of_birth:
                  type: string
                  format: date
                  example: "1985-04-12"
                driver_gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                driver_contact_no:
                  type: string
                  nullable: true
                address:
                  type: string
                  nullable: true
                driver_license_no:
                  type: string
                  example: B1234567
                license_expiry_date:
                  type: string
                  format: date
                  example: "2027-03-31"
      responses:
        '201':
          description: Driver registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Driver'
        '400':
          description: Licence already expired, or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: driver_identity_no or driver_license_no already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /drivers/{driverLicenseNo}:
    get:
      tags: [Drivers]
      summary: Get a driver by ID
      description: Returns decrypted PII. Jurisdiction-scoped.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Driver found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Driver'
        '404':
          description: Driver not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Drivers]
      summary: Update a driver
      description: Requires driver:edit. driver_identity_no, driver_id_type, driver_license_no are immutable.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_fullname:
                  type: string
                driver_contact_no:
                  type: string
                address:
                  type: string
                license_expiry_date:
                  type: string
                  format: date
      responses:
        '200':
          description: Driver updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Driver'
        '404':
          description: Driver not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Drivers]
      summary: Suspend a driver (soft delete)
      description: >
        Transitions status to SUSPENDED. Requires driver:delete.
        Blocked if driver has an active vehicle assignment.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Driver suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Driver has an active vehicle assignment or is already suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /drivers/{driverLicenseNo}/change-status:
    post:
      tags: [Drivers]
      summary: Change driver status
      description: Transitions driver to ACTIVE, SUSPENDED, or BLACKLISTED. Requires driver:change_status.
      parameters:
        - name: driverLicenseNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ACTIVE, SUSPENDED, BLACKLISTED]
      responses:
        '200':
          description: Driver status changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Driver'
        '409':
          description: Driver already has that status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # TRACKING DEVICES
  # ============================================================

  /tracking-devices:
    get:
      tags: [Tracking Devices]
      summary: List all tracking devices
      description: >
        Jurisdiction-scoped. Devices not assigned to any vehicle
        are only visible to NATIONAL users.
        Supports search and status filters.
      parameters:
        - name: search
          in: query
          description: Partial match on device_serial_no
          schema:
            type: string
        - name: device_status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Tracking devices retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/TrackingDevice'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Tracking Devices]
      summary: Register a new tracking device
      description: >
        Requires device:create. Automatically generates a unique firmware token
        (FIRMTUKTUKXXXX format), hashes it, and stores only the hash.
        The plain-text token is returned in this response exactly once —
        it must be recorded immediately for device provisioning and cannot
        be recovered after this response is closed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_serial_no]
              properties:
                device_serial_no:
                  type: string
                  example: SLPGPS000201
      responses:
        '201':
          description: >
            Tracking device registered. The device_token in the response body
            is the only time the plain-text firmware token is visible —
            record it before closing this response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TrackingDeviceCreated'
        '409':
          description: device_serial_no already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracking-devices/{deviceSerialNo}:
    get:
      tags: [Tracking Devices]
      summary: Get a tracking device by ID
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Device found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TrackingDevice'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Tracking Devices]
      summary: Update a tracking device
      description: Only device_serial_no is editable. Blocked if status is DECOMMISSIONED.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                device_serial_no:
                  type: string
      responses:
        '200':
          description: Device updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TrackingDevice'
        '409':
          description: Device is decommissioned or serial no already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Tracking Devices]
      summary: Decommission a tracking device (soft delete)
      description: >
        Transitions device_status to DECOMMISSIONED. Requires device:delete.
        Blocked if the device is currently assigned to a vehicle —
        use POST /assignments/assign-device to unassign first.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Device decommissioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: Device is currently assigned to a vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracking-devices/{deviceSerialNo}/status:
    get:
      tags: [Tracking Devices]
      summary: Get device status composite
      description: >
        Returns device details + the vehicle it is assigned to + its
        most recent GPS ping. Useful for device health monitoring dashboards.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Device status composite retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TrackingDeviceStatusComposite'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracking-devices/{deviceSerialNo}/location-pings:
    get:
      tags: [Tracking Devices]
      summary: Get ping history for a tracking device
      description: >
        Full ping history for a specific device.
        Supports optional start_time / end_time time-window filtering.
        Requires location:view_history.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
            example: "2025-04-19T00:00:00Z"
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
            example: "2025-04-26T23:59:59Z"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Ping history retrieved (newest first)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/LocationPing'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tracking-devices/{deviceSerialNo}/change-status:
    post:
      tags: [Tracking Devices]
      summary: Change device status
      description: >
        Transitions device to ACTIVE, INACTIVE, FAULTY, or DECOMMISSIONED.
        Requires device:assign_to_vehicle.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_status]
              properties:
                device_status:
                  type: string
                  enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]
      responses:
        '200':
          description: Device status changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TrackingDevice'
        '409':
          description: Device already has that status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # LOCATION PINGS
  # ============================================================

  /location-pings:
    post:
      tags: [Location Pings]
      summary: Submit a GPS ping from a tracking device
      description: >
        Device-to-server endpoint. No JWT required — hardware tracking devices
        authenticate using the X-Device-Token header carrying their firmware token
        (FIRMTUKTUKXXXX). The server hashes the incoming token and resolves the
        device record from the hash. No device_id needs to be sent — the token
        is the sole credential and identity.
 
 
        The device must not be DECOMMISSIONED and must be currently assigned to a
        vehicle. ping_timestamp defaults to server time if omitted, which supports
        offline-sync after connectivity gaps.
      security:
        - DeviceTokenAuth: []
      parameters:
        - name: X-Device-Token
          in: header
          required: true
          description: >
            Firmware token issued to this device at registration (FIRMTUKTUKXXXX format).
            The server hashes the value and looks up the matching device record.
          schema:
            type: string
            example: FIRMTUKTUK0042
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitude, longitude]
              properties:
                latitude:
                  type: number
                  format: double
                  minimum: -90
                  maximum: 90
                  example: 6.9271
                longitude:
                  type: number
                  format: double
                  minimum: -180
                  maximum: 180
                  example: 79.8612
                ping_timestamp:
                  type: string
                  format: date-time
                  description: Device-side timestamp. Defaults to server time if omitted.
                  example: "2025-04-26T10:30:00Z"
                speed_kmh:
                  type: number
                  format: double
                  nullable: true
                  example: 32.5
                device_battery:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 100
                  example: 74
      responses:
        '201':
          description: Ping recorded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LocationPing'
        '401':
          description: X-Device-Token header missing or token does not match any device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Device token is valid but the device has been decommissioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Device is not currently assigned to any vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
 

  # ============================================================
  # ASSIGNMENTS (Controller Resources)
  # ============================================================

  /assignments/assign-driver:
    post:
      tags: [Assignments]
      summary: Assign a driver to a vehicle
      description: >
        Controller resource (verb, not noun) — per WSO2 REST Design Guidelines section 4.4.
        Enforces atomically:
        1. Vehicle must exist and not be DEREGISTERED.
        2. Driver must exist and be ACTIVE.
        3. Vehicle must not already have an active driver (enforced at service layer
           and also by a partial unique index on vehicle_driver_assignments).
        4. Driver must not already be assigned to another vehicle.
        Requires assignment:create permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicle_id, driver_id]
              properties:
                vehicle_id:
                  type: string
                  
                driver_id:
                  type: string
                  
                is_driver_owner:
                  type: boolean
                  default: false
                  description: Set to true if the driver is also the registered owner of this vehicle
      responses:
        '201':
          description: Driver assigned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AssignmentRecord'
        '404':
          description: Vehicle not found, or driver not found / not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Vehicle already has an active driver, or driver is already assigned elsewhere
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assignments/unassign-driver:
    post:
      tags: [Assignments]
      summary: Unassign the current driver from a vehicle
      description: >
        Controller resource. Closes the active assignment by recording
        unassigned_time and setting is_current_driver = false.
        The assignment record is never deleted — it forms the permanent audit trail.
        Requires assignment:close permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicle_id]
              properties:
                vehicle_id:
                  type: string
                  
      responses:
        '200':
          description: Driver unassigned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AssignmentRecord'
        '404':
          description: Vehicle not found, or vehicle has no active driver assignment to close
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assignments/assign-device:
    post:
      tags: [Assignments]
      summary: Assign a tracking device to a vehicle
      description: >
        Controller resource. Links a tracking device to a vehicle by
        setting vehicles.device_id. Enforces atomically:
        1. Vehicle must exist and not be DEREGISTERED.
        2. Device must exist and not be DECOMMISSIONED.
        3. Vehicle must not already have a device (vehicles.device_id must be NULL).
        4. Device must not already be assigned to another vehicle.
        Requires device:assign_to_vehicle permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicle_id, device_id]
              properties:
                vehicle_id:
                  type: string
                  
                device_id:
                  type: string
                  
      responses:
        '201':
          description: Device assigned successfully. Returns the updated vehicle record.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          vehicle_id:
                            type: string
                            
                          license_plate_no:
                            type: string
                          status:
                            type: string
                          device_id:
                            type: string
                            
                          district_id:
                            type: string
                            
        '404':
          description: Vehicle or device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Vehicle already has a device, or device is already assigned to another vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
