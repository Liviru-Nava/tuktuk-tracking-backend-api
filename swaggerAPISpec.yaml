        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Owners]
      summary: Register a new vehicle owner
      description: Requires owner:create. PII fields are AES-256-GCM encrypted before DB insert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerCreate'
            example:
              owner_fullname: "Amara Perera"
              owner_identity_no: "895678901V"
