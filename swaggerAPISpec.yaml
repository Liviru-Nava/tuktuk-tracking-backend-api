  # ── TRACKING DEVICES ─────────────────────────────────────────────────────────
  /tracking-devices:
    get:
      tags: [Tracking Devices]
      summary: List GPS tracking devices
      description: Requires device:view permission.
      parameters:
        - name: device_status
          in: query
          schema:
            $ref: '#/components/schemas/DeviceStatus'
        - name: assigned
          in: query
          description: Filter by assignment state (true = assigned to a vehicle, false = unassigned)
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrackingDevice'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Tracking Devices]
      summary: Register a new tracking device
      description: |
        Requires device:create (HQ only).
        The service generates the firmware token (FIRMTUKTUK{N} format), stores
        HMAC-SHA256(token) as device_token_hash, and returns the plain-text token
        **once** in the response. Record it immediately — it is never retrievable again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackingDeviceCreate'
            example:
              device_serial_no: "SLPGPS000201"
      responses:
        '201':
          description: Device registered. Firmware token returned once only.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/TrackingDevice'
                  - type: object
                    properties:
                      firmware_token:
                        type: string
                        description: Plain-text token — store immediately, never returned again
                        example: "FIRMTUKTUK000201"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /tracking-devices/{deviceSerialNo}:
    get:
      tags: [Tracking Devices]
      summary: Get a tracking device by serial number
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          description: Hardware serial number printed on the physical device
          schema:
            type: string
            example: "SLPGPS000001"
      responses:
        '200':
          description: Device detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingDevice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Tracking Devices]
      summary: Update a tracking device by serial number
      description: Requires device:edit permission.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
          schema:
            type: string
            example: "SLPGPS000001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackingDeviceUpdate'
      responses:
        '200':
          description: Device updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingDevice'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tracking Devices]
      summary: Decommission a tracking device (soft delete  sets status to DECOMMISSIONED)
      description: Requires device:delete permission. Physical row is never deleted.
      parameters:
        - name: deviceSerialNo
          in: path
          required: true
