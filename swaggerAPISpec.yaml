openapi: 3.0.3

info:
  title: Sri Lanka Police  Real-Time Tuk-Tuk Tracking & Movement Logging API
  description: |
    ## Overview
    Centralized RESTful API for Sri Lanka Police to manage, track, and investigate
    registered three-wheelers (tuk-tuks) in real time.
    The system collects GPS-based location pings from 200+ registered vehicles and
    provides live visibility, historical movement logs, and province/district-level
    filtering for authorized law-enforcement users.

    ## Authentication
    All endpoints (except /tuktrack/v1/auth/login and /tuktrack/v1/auth/refresh)
    require a valid **Bearer JWT** in the Authorization header.

    ## Role Hierarchy
    | Role | Scope |
    |------|-------|
    | HQ_SUPER_ADMIN | NATIONAL  full system access |
    | HQ_OFFICER | NATIONAL  read + status changes |
    | PROVINCIAL_HEAD | PROVINCIAL  manage within own province |
    | PROVINCIAL_OFFICER | PROVINCIAL  read + status changes |
    | DISTRICT_HEAD | DISTRICT  manage within own district |
    | DISTRICT_OFFICER | DISTRICT  read + status changes |
    | STATION_HEAD | STATION  manage within own station |
    | STATION_OFFICER | STATION  read only |

    ## Base URLs
    - **Production (AWS EC2):** http://43.205.28.67:3000
    - **Local Development:** http://localhost:3000

  version: "1.0.0"
  contact:
    name: Sri Lanka Police  ICT Division
    email: ict@police.gov.lk
  license:
    name: Government of Sri Lanka  Internal Use Only

servers:
  - url: http://43.205.28.67:3000/tuktrack/v1
    description: Production  AWS EC2 (ap-south-1)
  - url: http://localhost:3000/tuktrack/v1
    description: Local Development

tags:
  - name: Auth
    description: Authentication  login, token refresh, logout
  - name: Provinces
    description: Read-only reference data for all 9 Sri Lanka provinces
  - name: Districts
    description: Read-only reference data for all 25 Sri Lanka districts
  - name: Offices
    description: Police offices (HQ, Provincial HQs, District HQs, Stations)
  - name: Roles
    description: System roles and permission arrays (HQ_SUPER_ADMIN only)
  - name: Users
    description: Police officer accounts  identified by badgeId
  - name: Owners
    description: Registered tuk-tuk owners (RMV/DMT)  identified by ownerIdentityNo
  - name: Tracking Devices
    description: GPS hardware devices  identified by deviceSerialNo
  - name: Vehicles
    description: Registered three-wheelers  identified by licensePlateNo
  - name: Drivers
    description: Licensed tuk-tuk drivers  identified by driverLicenseNo
  - name: Assignments
    description: Vehicledriver and vehicledevice assignment controller resources
  - name: Location Pings
    description: GPS location ping ingest (device → server, append-only)

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY SCHEMES
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from POST /auth/login
    DeviceTokenAuth:
      type: apiKey
      in: header
      name: X-Device-Token
      description: |
        Plain-text firmware token provisioned at device registration
        (format: FIRMTUKTUK0001). The server computes HMAC-SHA256 of this
        value and compares it against device_token_hash in the database.

  # ───────────────────────────────────────────────────────────────────────────
  # REUSABLE SCHEMAS
  # ───────────────────────────────────────────────────────────────────────────
  schemas:

    # ── Enumerations ──────────────────────────────────────────────────────────
    OfficeType:
      type: string
      enum: [HEADQUARTERS, PROVINCIAL_HQ, DISTRICT_HQ, DIVISIONAL_STATION]
    OfficeStatus:
      type: string
      enum: [ACTIVE, CLOSED]
    JurisdictionType:
      type: string
      enum: [NATIONAL, PROVINCIAL, DISTRICT]
    RoleName:
      type: string
      enum:
        - HQ_SUPER_ADMIN
        - HQ_OFFICER
        - PROVINCIAL_HEAD
        - PROVINCIAL_OFFICER
        - DISTRICT_HEAD
        - DISTRICT_OFFICER
        - STATION_HEAD
        - STATION_OFFICER
    UserManagementScope:
      type: string
      enum: [NATIONAL, PROVINCIAL, DISTRICT, STATION, NONE]
    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]
    OwnerIdType:
      type: string
      enum: [NIC, PASSPORT, BUSINESS]
    Gender:
      type: string
      enum: [MALE, FEMALE, OTHER]
    OwnerStatus:
      type: string
      enum: [ACTIVE, INACTIVE, FLAGGED]
    VehicleFuelType:
      type: string
      enum: [PETROL, CNG, ELECTRIC]
    VehicleStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, FLAGGED, DEREGISTERED]
    DriverIdType:
      type: string
      enum: [NIC, PASSPORT]
    DriverStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, BLACKLISTED]
    DeviceStatus:
      type: string
      enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]

    # ── Common ────────────────────────────────────────────────────────────────
    UUID:
      type: string
      format: uuid
      example: "44444444-0001-0001-0001-000000000001"

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 200
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 10
        next:
          type: string
          nullable: true
          example: "/tuktrack/v1/vehicles?page=2&limit=20"
        previous:
          type: string
          nullable: true
          example: null

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Validation failed"
        description:
          type: string
          example: "One or more fields failed validation"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "license_plate_no"
              message:
                type: string
                example: "License plate number already exists"

    # ── Auth ──────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: "hq.superadmin"
        password:
          type: string
          format: password
          example: "Liviru@123"

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: Short-lived JWT (15 min)
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: Long-lived refresh token (7 days); stored as SHA-256 hash
          example: "d3f4b9a1c2e8..."
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          description: Access token TTL in seconds
          example: 900
        user:
          $ref: '#/components/schemas/UserSummary'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: "d3f4b9a1c2e8..."

    # ── Province ──────────────────────────────────────────────────────────────
    Province:
      type: object
      properties:
        province_id:
          $ref: '#/components/schemas/UUID'
        province_name:
          type: string
          example: "Central Province"
        province_code:
          type: string
          example: "CP"
        created_time:
          type: string
          format: date-time

    # ── District ──────────────────────────────────────────────────────────────
    District:
      type: object
      properties:
        district_id:
          $ref: '#/components/schemas/UUID'
        province_id:
          $ref: '#/components/schemas/UUID'
        province_name:
          type: string
          example: "Central Province"
        district_name:
          type: string
          example: "Kandy"
        district_code:
          type: string
          example: "KAN"
        created_time:
          type: string
          format: date-time

    # ── Office ────────────────────────────────────────────────────────────────
    Office:
      type: object
      properties:
        office_id:
          $ref: '#/components/schemas/UUID'
        office_code:
          type: string
          example: "SLP-PHQ-CP"
        office_name:
          type: string
          example: "Central Province Police Headquarters"
        office_type:
          $ref: '#/components/schemas/OfficeType'
        jurisdiction_type:
          $ref: '#/components/schemas/JurisdictionType'
        jurisdiction_ref_id:
          type: string
          format: uuid
          nullable: true
          example: "11111111-0002-0002-0002-000000000002"
        office_address:
          type: string
          nullable: true
          example: "Kandy Road, Kandy"
        office_contact:
          type: string
          nullable: true
          example: "+94812234567"
        status:
          $ref: '#/components/schemas/OfficeStatus'
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    OfficeCreate:
      type: object
      required:
        - office_code
        - office_name
        - office_type
        - jurisdiction_type
      properties:
        office_code:
          type: string
          maxLength: 50
          example: "SLP-DS-KAN-001"
        office_name:
          type: string
          maxLength: 150
          example: "Kandy Central Divisional Station"
        office_type:
          $ref: '#/components/schemas/OfficeType'
        jurisdiction_type:
          $ref: '#/components/schemas/JurisdictionType'
        jurisdiction_ref_id:
          type: string
          format: uuid
          nullable: true
          description: |
            NULL for NATIONAL, province_id for PROVINCIAL, district_id for DISTRICT.
          example: "22222222-0004-0004-0004-000000000004"
        office_address:
          type: string
          nullable: true
          example: "Temple Road, Kandy"
        office_contact:
          type: string
          maxLength: 20
          nullable: true
          example: "+94812223344"

    OfficeUpdate:
      type: object
      properties:
        office_name:
          type: string
          maxLength: 150
        office_address:
          type: string
          nullable: true
        office_contact:
          type: string
          maxLength: 20
          nullable: true
        status:
          $ref: '#/components/schemas/OfficeStatus'

    # ── Role ──────────────────────────────────────────────────────────────────
    Role:
      type: object
      properties:
        role_id:
          $ref: '#/components/schemas/UUID'
        role_name:
          $ref: '#/components/schemas/RoleName'
        role_description:
          type: string
          nullable: true
        user_management_scope:
          $ref: '#/components/schemas/UserManagementScope'
        permissions:
          type: array
          items:
            type: string
          example:
            - "vehicle:view"
            - "location:view_live"
            - "location:view_history"

    RoleUpdate:
      type: object
      properties:
        role_description:
          type: string
        permissions:
          type: array
          items:
            type: string
          example:
            - "vehicle:view"
            - "driver:view"
            - "location:view_live"

    # ── User ──────────────────────────────────────────────────────────────────
    UserSummary:
      type: object
      properties:
        user_id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
          example: "hq.superadmin"
        fullname:
          type: string
          example: "Rohana Wickramasinghe"
        badge_id:
          type: string
          example: "SLP-HQ-0001"
        role_name:
          $ref: '#/components/schemas/RoleName'
        office_name:
          type: string
          example: "Sri Lanka Police Headquarters"
        status:
          $ref: '#/components/schemas/UserStatus'

    User:
      type: object
      properties:
        user_id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
          example: "cp.head"
        fullname:
          type: string
          example: "Sunil Bandara"
        email_address:
          type: string
          format: email
          example: "sunil.b@police.gov.lk"
        badge_id:
          type: string
          example: "SLP-CP-0001"
        contact_no:
          type: string
          nullable: true
          description: Decrypted at service layer (AES-256-GCM encrypted at rest)
          example: "+94771234567"
        office_id:
          $ref: '#/components/schemas/UUID'
        office_name:
          type: string
          example: "Central Province Police Headquarters"
        role_id:
          $ref: '#/components/schemas/UUID'
        role_name:
          $ref: '#/components/schemas/RoleName'
        status:
          $ref: '#/components/schemas/UserStatus'
        last_login_time:
          type: string
          format: date-time
          nullable: true
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    UserCreate:
      type: object
      required:
        - username
        - fullname
        - email_address
        - password
        - badge_id
        - office_id
        - role_id
      properties:
        username:
          type: string
          maxLength: 100
          example: "kan.officer1"
        fullname:
          type: string
          maxLength: 200
          example: "Prasad Hettige"
        email_address:
          type: string
          format: email
          example: "prasad.h@police.gov.lk"
        password:
          type: string
          format: password
          minLength: 8
          example: "Secure@2026"
        badge_id:
          type: string
          maxLength: 50
          example: "SLP-KAN-0015"
        contact_no:
          type: string
          nullable: true
          example: "+94771234567"
        office_id:
          $ref: '#/components/schemas/UUID'
        role_id:
          $ref: '#/components/schemas/UUID'

    UserUpdate:
      type: object
      properties:
        fullname:
          type: string
          maxLength: 200
        email_address:
          type: string
          format: email
        contact_no:
          type: string
          nullable: true
        office_id:
          $ref: '#/components/schemas/UUID'
        role_id:
          $ref: '#/components/schemas/UUID'

    ResetPasswordRequest:
      type: object
      required: [new_password]
      properties:
        new_password:
          type: string
          format: password
          minLength: 8
          example: "NewPolice@2026"

    # ── Owner ─────────────────────────────────────────────────────────────────
    Owner:
      type: object
      properties:
        owner_id:
          $ref: '#/components/schemas/UUID'
        owner_fullname:
          type: string
          example: "Harsha Liyanage"
        owner_identity_no:
          type: string
          description: Decrypted NIC/Passport/Business Reg. (AES-256-GCM at rest)
          example: "871234567V"
        owner_id_type:
          $ref: '#/components/schemas/OwnerIdType'
        owner_gender:
          $ref: '#/components/schemas/Gender'
        owner_contact:
          type: string
          nullable: true
          description: Decrypted phone number
          example: "+94771234567"
        owner_address:
          type: string
          nullable: true
          description: Decrypted residential address
          example: "45/A, Kandy Road, Kurunegala"
        status:
          $ref: '#/components/schemas/OwnerStatus'
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    OwnerCreate:
      type: object
      required:
        - owner_fullname
        - owner_identity_no
        - owner_id_type
        - owner_gender
      properties:
        owner_fullname:
          type: string
          maxLength: 200
          example: "Priya Kumari"
        owner_identity_no:
          type: string
          description: Plain-text NIC/Passport/Business Reg. (encrypted before insert)
          example: "906789123V"
        owner_id_type:
          $ref: '#/components/schemas/OwnerIdType'
        owner_gender:
          $ref: '#/components/schemas/Gender'
        owner_contact:
          type: string
          nullable: true
          example: "+94779876543"
        owner_address:
          type: string
          nullable: true
          example: "12, Galle Road, Matara"

    OwnerUpdate:
      type: object
      properties:
        owner_fullname:
          type: string
          maxLength: 200
        owner_contact:
          type: string
          nullable: true
        owner_address:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/OwnerStatus'

    # ── Tracking Device ───────────────────────────────────────────────────────
    TrackingDevice:
      type: object
      properties:
        device_id:
          $ref: '#/components/schemas/UUID'
        device_serial_no:
          type: string
          example: "SLPGPS000001"
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
        vehicle_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the vehicle this device is currently assigned to
        license_plate_no:
          type: string
          nullable: true
          example: "TUK-0001"
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    TrackingDeviceCreate:
      type: object
      required: [device_serial_no]
      properties:
        device_serial_no:
          type: string
          maxLength: 100
          example: "SLPGPS000201"
        device_status:
          $ref: '#/components/schemas/DeviceStatus'

    TrackingDeviceUpdate:
      type: object
      properties:
        device_status:
          $ref: '#/components/schemas/DeviceStatus'

    ChangeDeviceStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/DeviceStatus'

    # ── Vehicle ───────────────────────────────────────────────────────────────
    Vehicle:
      type: object
      properties:
        vehicle_id:
          $ref: '#/components/schemas/UUID'
        owner_id:
          $ref: '#/components/schemas/UUID'
        owner_fullname:
          type: string
          example: "Harsha Liyanage"
        district_id:
          $ref: '#/components/schemas/UUID'
        district_name:
          type: string
          example: "Kurunegala"
        device_id:
          type: string
          format: uuid
          nullable: true
        device_serial_no:
          type: string
          nullable: true
          example: "SLPGPS000001"
        license_plate_no:
          type: string
          example: "TUK-0001"
        chassis_number:
          type: string
          example: "CHSPI000001"
        engine_number:
          type: string
          example: "ENGPI000001"
        make_of_vehicle:
          type: string
          example: "Piaggio"
        model_of_vehicle:
          type: string
          example: "Ape Xtra"
        manufacture_year:
          type: integer
          example: 2020
        vehicle_colour:
          type: string
          nullable: true
          example: "Black"
        fuel_type:
          $ref: '#/components/schemas/VehicleFuelType'
        is_diplomatic:
          type: boolean
          example: false
        vehicle_reg_date:
          type: string
          format: date
          example: "2020-05-12"
        status:
          $ref: '#/components/schemas/VehicleStatus'
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    VehicleFullProfile:
      type: object
      description: Composite resource  vehicle + owner + current driver + device in one response
      properties:
        vehicle:
          $ref: '#/components/schemas/Vehicle'
        owner:
          $ref: '#/components/schemas/Owner'
        current_driver:
          allOf:
            - $ref: '#/components/schemas/Driver'
          nullable: true
        device:
          allOf:
            - $ref: '#/components/schemas/TrackingDevice'
          nullable: true
        current_assignment:
          allOf:
            - $ref: '#/components/schemas/Assignment'
          nullable: true

    VehicleCreate:
      type: object
      required:
        - owner_id
        - district_id
        - license_plate_no
        - chassis_number
        - engine_number
        - make_of_vehicle
        - model_of_vehicle
        - manufacture_year
        - fuel_type
        - vehicle_reg_date
      properties:
        owner_id:
          $ref: '#/components/schemas/UUID'
        district_id:
          $ref: '#/components/schemas/UUID'
        device_id:
          type: string
          format: uuid
          nullable: true
          description: Optional  assign a provisioned tracking device at registration
        license_plate_no:
          type: string
          maxLength: 20
          example: "TUK-0201"
        chassis_number:
          type: string
          maxLength: 50
          example: "CHSBA000201"
        engine_number:
          type: string
          maxLength: 50
          example: "ENGBA000201"
        make_of_vehicle:
          type: string
          maxLength: 100
          example: "Bajaj"
        model_of_vehicle:
          type: string
          maxLength: 100
          example: "RE 4S"
        manufacture_year:
          type: integer
          minimum: 1990
          maximum: 2030
          example: 2022
        vehicle_colour:
          type: string
          maxLength: 50
          nullable: true
          example: "Yellow"
        fuel_type:
          $ref: '#/components/schemas/VehicleFuelType'
        is_diplomatic:
          type: boolean
          default: false
        vehicle_reg_date:
          type: string
          format: date
          example: "2022-08-15"

    VehicleUpdate:
      type: object
      properties:
        owner_id:
          $ref: '#/components/schemas/UUID'
        district_id:
          $ref: '#/components/schemas/UUID'
        vehicle_colour:
          type: string
          nullable: true
        is_diplomatic:
          type: boolean

    ChangeVehicleStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/VehicleStatus'

    # ── Driver ────────────────────────────────────────────────────────────────
    Driver:
      type: object
      properties:
        driver_id:
          $ref: '#/components/schemas/UUID'
        driver_fullname:
          type: string
          example: "Sachith Dissanayake"
        driver_identity_no:
          type: string
          description: Decrypted NIC/Passport (AES-256-GCM at rest)
          example: "712345678V"
        driver_id_type:
          $ref: '#/components/schemas/DriverIdType'
        date_of_birth:
          type: string
          format: date
          example: "1971-02-02"
        driver_gender:
          $ref: '#/components/schemas/Gender'
        driver_contact_no:
          type: string
          nullable: true
          description: Decrypted phone number
          example: "+94775678901"
        address:
          type: string
          nullable: true
          description: Decrypted residential address
          example: "23, Temple Road, Kandy"
        driver_license_no:
          type: string
          description: Decrypted driving licence number
          example: "B1234567"
        license_expiry_date:
          type: string
          format: date
          example: "2026-02-28"
        status:
          $ref: '#/components/schemas/DriverStatus'
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    DriverCreate:
      type: object
      required:
        - driver_fullname
        - driver_identity_no
        - driver_id_type
        - date_of_birth
        - driver_gender
        - driver_license_no
        - license_expiry_date
      properties:
        driver_fullname:
          type: string
          maxLength: 200
          example: "Kasun Jayawardena"
        driver_identity_no:
          type: string
          description: Plain-text NIC/Passport (encrypted before insert)
          example: "852345678V"
        driver_id_type:
          $ref: '#/components/schemas/DriverIdType'
        date_of_birth:
          type: string
          format: date
          example: "1985-07-15"
        driver_gender:
          $ref: '#/components/schemas/Gender'
        driver_contact_no:
          type: string
          nullable: true
          example: "+94771234567"
        address:
          type: string
          nullable: true
          example: "45, Main Street, Galle"
        driver_license_no:
          type: string
          description: Plain-text driving licence number (encrypted before insert)
          example: "B9876543"
        license_expiry_date:
          type: string
          format: date
          example: "2028-06-30"

    DriverUpdate:
      type: object
      properties:
        driver_contact_no:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        license_expiry_date:
          type: string
          format: date

    ChangeDriverStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/DriverStatus'

    # ── Assignment ────────────────────────────────────────────────────────────
    Assignment:
      type: object
      properties:
        assignment_id:
          $ref: '#/components/schemas/UUID'
        vehicle_id:
          $ref: '#/components/schemas/UUID'
        license_plate_no:
          type: string
          example: "TUK-0001"
        driver_id:
          $ref: '#/components/schemas/UUID'
        driver_fullname:
          type: string
          example: "Sachith Dissanayake"
        driver_license_no:
          type: string
          example: "B1234567"
        assigned_time:
          type: string
          format: date-time
          example: "2025-01-01T06:00:00+05:30"
        unassigned_time:
          type: string
          format: date-time
          nullable: true
          example: null
        is_current_driver:
          type: boolean
          example: true
        is_driver_owner:
          type: boolean
          example: false

    AssignDriverRequest:
      type: object
      required: [license_plate_no, driver_license_no]
      properties:
        license_plate_no:
          type: string
          description: License plate of the vehicle to assign the driver to
          example: "TUK-0001"
        driver_license_no:
          type: string
          description: Driving licence number of the driver being assigned
          example: "B1234567"
        is_driver_owner:
          type: boolean
          default: false
          description: Set true when the registered owner is also driving this vehicle

    UnassignDriverRequest:
      type: object
      required: [license_plate_no]
      properties:
        license_plate_no:
          type: string
          description: License plate of the vehicle to unassign the driver from
          example: "TUK-0001"

    AssignDeviceRequest:
      type: object
      required: [license_plate_no, device_serial_no]
      properties:
        license_plate_no:
          type: string
          description: License plate of the vehicle to assign the device to
          example: "TUK-0001"
        device_serial_no:
          type: string
          description: Serial number of the tracking device being assigned
          example: "SLPGPS000001"

    # ── Location Ping ─────────────────────────────────────────────────────────
    LocationPing:
      type: object
      properties:
        ping_id:
          $ref: '#/components/schemas/UUID'
        device_id:
          $ref: '#/components/schemas/UUID'
        vehicle_id:
          type: string
          format: uuid
          nullable: true
        license_plate_no:
          type: string
          nullable: true
          example: "TUK-0001"
        latitude:
          type: number
          format: double
          example: 7.6808590
        longitude:
          type: number
          format: double
          example: 80.3892932
        ping_timestamp:
          type: string
          format: date-time
          example: "2026-04-26T00:00:00Z"
        speed_kmh:
          type: number
          format: double
          nullable: true
          example: 0.22
        device_battery:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          example: 76

    LocationPingCreate:
      type: object
      required: [device_serial_no, latitude, longitude, ping_timestamp]
      properties:
        device_serial_no:
          type: string
          description: Serial number of the submitting device
          example: "SLPGPS000001"
        latitude:
          type: number
          format: double
          minimum: 5.7
          maximum: 10.0
          description: Sri Lanka latitude range
          example: 7.2906
        longitude:
          type: number
          format: double
          minimum: 79.5
          maximum: 82.0
          description: Sri Lanka longitude range
          example: 80.6337
        ping_timestamp:
          type: string
          format: date-time
          example: "2026-05-03T08:30:00+05:30"
        speed_kmh:
          type: number
          format: double
          nullable: true
          minimum: 0
          example: 23.5
        device_battery:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          example: 85

    LastLocation:
      type: object
      properties:
        vehicle_id:
          $ref: '#/components/schemas/UUID'
        license_plate_no:
          type: string
          example: "TUK-0001"
        device_id:
          $ref: '#/components/schemas/UUID'
        device_serial_no:
          type: string
          example: "SLPGPS000001"
        latitude:
          type: number
          format: double
          example: 7.6808590
        longitude:
          type: number
          format: double
          example: 80.3892932
        ping_timestamp:
          type: string
          format: date-time
        speed_kmh:
          type: number
          format: double
          nullable: true
        device_battery:
          type: integer
          nullable: true
        minutes_since_last_ping:
          type: number
          format: double
          description: Staleness indicator in minutes
          example: 2.5

  # ───────────────────────────────────────────────────────────────────────────
  # REUSABLE PARAMETERS
  # ───────────────────────────────────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    FromParam:
      name: from
      in: query
      description: ISO 8601 start datetime for time-window queries
      schema:
        type: string
        format: date-time
        example: "2026-04-26T00:00:00Z"
    ToParam:
      name: to
      in: query
      description: ISO 8601 end datetime for time-window queries
      schema:
        type: string
        format: date-time
        example: "2026-05-03T23:59:59Z"

  # ───────────────────────────────────────────────────────────────────────────
  # REUSABLE RESPONSES
  # ───────────────────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: "Unauthorized"
            description: "A valid Bearer token is required"
    Forbidden:
      description: Authenticated user lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 403
            message: "Forbidden"
            description: "Insufficient permissions or outside jurisdiction"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 404
            message: "Not Found"
            description: "The requested resource does not exist"
    Conflict:
      description: Unique constraint violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 409
            message: "Conflict"
            description: "A resource with this identifier already exists"
    ValidationError:
      description: Request body or query parameter validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# =============================================================================
# PATHS
# =============================================================================
security:
  - BearerAuth: []

paths:

  # ── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login  obtain JWT access and refresh tokens
      description: |
        Authenticates a police user with username/password (bcrypt verified).
        Returns a short-lived access token (15 min) and a long-lived refresh token (7 days).
        Password for all seed users: **Liviru@123**
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              hq_superadmin:
                summary: HQ Super Admin
                value:
                  username: "hq.superadmin"
                  password: "Liviru@123"
              wp_head:
                summary: Western Province Head
                value:
                  username: "wp.head"
                  password: "Liviru@123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh  obtain a new access token using a refresh token
      description: Token rotation  each refresh issues new tokens and revokes the old refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Refresh token expired, revoked, or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout  revoke the current refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── PROVINCES ───────────────────────────────────────────────────────────────
  /provinces:
    get:
      tags: [Provinces]
      summary: List all 9 Sri Lanka provinces
      description: Immutable reference data. Requires province:view permission.
      responses:
        '200':
          description: List of provinces
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Province'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 9
        '401':
          $ref: '#/components/responses/Unauthorized'

  /provinces/{provinceId}:
    get:
      tags: [Provinces]
      summary: Get a province by UUID
      parameters:
        - name: provinceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Province detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Province'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /provinces/{provinceId}/districts:
    get:
      tags: [Provinces]
      summary: List districts within a province
      parameters:
        - name: provinceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Districts in the province
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/District'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── DISTRICTS ───────────────────────────────────────────────────────────────
  /districts:
    get:
      tags: [Districts]
      summary: List all 25 Sri Lanka districts
      parameters:
        - name: provinceId
          in: query
          description: Filter by province UUID
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of districts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/District'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /districts/{districtId}:
    get:
      tags: [Districts]
      summary: Get a district by UUID
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: District detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/District'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /districts/{districtId}/offices:
    get:
      tags: [Districts]
      summary: List offices in a district
      description: Requires office:view permission.
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Offices in the district
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Office'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── OFFICES ──────────────────────────────────────────────────────────────────
  /offices:
    get:
      tags: [Offices]
      summary: List police offices
      description: Requires office:view. Results scoped to caller's jurisdiction.
      parameters:
        - name: office_type
          in: query
          schema:
            $ref: '#/components/schemas/OfficeType'
        - name: jurisdiction_type
          in: query
          schema:
            $ref: '#/components/schemas/JurisdictionType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OfficeStatus'
        - name: provinceId
          in: query
          schema:
            type: string
            format: uuid
        - name: districtId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of offices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Office'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Offices]
      summary: Create a new police office
      description: Requires office:create permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficeCreate'
            example:
              office_code: "SLP-DS-KAN-002"
              office_name: "Peradeniya Divisional Station"
              office_type: "DIVISIONAL_STATION"
              jurisdiction_type: "DISTRICT"
              jurisdiction_ref_id: "22222222-0004-0004-0004-000000000004"
              office_address: "Peradeniya Road, Kandy"
              office_contact: "+94812200100"
      responses:
        '201':
          description: Office created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /offices/{officeId}:
    get:
      tags: [Offices]
      summary: Get an office by UUID
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Office detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Offices]
      summary: Update an office (full replacement)
      description: Requires office:edit permission.
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficeUpdate'
      responses:
        '200':
          description: Office updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Offices]
      summary: Soft-close an office (sets status to CLOSED)
      description: Requires office:delete permission. No physical row removal.
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Office closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Office closed successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /offices/{officeId}/users:
    get:
      tags: [Offices]
      summary: List users assigned to this office
      description: Requires user:view permission.
      parameters:
        - name: officeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Users in this office
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── ROLES ────────────────────────────────────────────────────────────────────
  /roles:
    get:
      tags: [Roles]
      summary: List all system roles
      description: Requires user:view permission.
      responses:
        '200':
          description: List of roles with their permission arrays
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /roles/{roleId}:
    get:
      tags: [Roles]
      summary: Get a role by UUID
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Role detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Roles]
      summary: Update role description or permissions (HQ_SUPER_ADMIN only)
      description: Requires user:edit. Role names and scopes are immutable  only description and permissions array are editable.
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── USERS ────────────────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: List police users
      description: |
        Requires user:view. Results scoped to caller's user_management_scope.
        Supports filtering by role, status, and office.
      parameters:
        - name: role_name
          in: query
          schema:
            $ref: '#/components/schemas/RoleName'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: officeId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Create a new police user
      description: Requires user:create within caller's jurisdiction scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
            example:
              username: "kan.officer2"
              fullname: "Thilina Rathnayake"
              email_address: "thilina.r@police.gov.lk"
              password: "Police@2026"
              badge_id: "SLP-KAN-0016"
              contact_no: "+94712345678"
              office_id: "44444444-0009-0009-0009-000000000009"
              role_id: "33333333-0007-0007-0007-000000000007"
      responses:
        '201':
          description: User created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{badgeId}:
    get:
      tags: [Users]
      summary: Get a user by badge ID
      description: Requires user:view permission.
      parameters:
        - name: badgeId
          in: path
          required: true
          description: Police badge number (e.g. SLP-HQ-0001)
          schema:
            type: string
            example: "SLP-HQ-0001"
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update a user by badge ID
      description: Requires user:edit. Users may update their own profile; admins may update within jurisdiction.
      parameters:
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
            example: "SLP-HQ-0001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Users]
      summary: Deactivate a user by badge ID (soft delete  sets status to INACTIVE)
      description: Requires user:deactivate. Physical row is never deleted.
      parameters:
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
            example: "SLP-HQ-0001"
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User deactivated successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
