openapi: 3.0.3

info:
  title: Real-Time Tuk-Tuk Tracking and Movement Logging System
  description: >
    RESTful Web API for Sri Lanka Police to track and manage registered three-wheelers
    (tuk-tuks) in real time. Provides GPS-based location pings, historical movement logs,
    vehicle and driver management, and secure access for authorised users at Police
    Headquarters, Provincial offices, and District/Station level.


    **Authentication:** All endpoints (except /auth/login and /auth/refresh) require a
    Bearer JWT access token in the Authorization header. Tokens expire after 15 minutes.
    Use POST /auth/refresh to obtain a new token.

    **Device Authentication:** The POST /location-pings endpoint does not use JWT.
    Hardware tracking devices authenticate using the X-Device-Token header. Each device
    is issued a unique firmware token (format FIRMTUKTUKXXXX) at registration time —
    this token is shown exactly once and must be recorded at provisioning. The raw token
    is never stored; only its HMAC-SHA256 hash is persisted.

    **Jurisdiction:** Responses are automatically scoped to the requesting user's
    jurisdiction (NATIONAL / PROVINCIAL / DISTRICT / STATION). A station officer will
    only ever see data within their district.


    **PII:** Fields such as owner_identity_no, owner_contact, driver_identity_no,
    driver_license_no, and driver_contact_no are AES-256-GCM encrypted at rest.
    They are decrypted in the service layer before being returned in API responses.
  version: 1.0.0
  contact:
    name: NB6007CEM Web API Development — NIBM / Coventry University

servers:
  - url: http://localhost:3000/tuktrack/v1
    description: Local development server

tags:
  - name: Auth
    description: Login, token refresh, and logout
  - name: Provinces
    description: Sri Lanka province reference data
  - name: Districts
    description: Sri Lanka district reference data
  - name: Roles
    description: System role definitions and permission arrays
  - name: Offices
    description: Police offices — HQ, Provincial HQs, District HQs, Divisional Stations
  - name: Users
    description: System users — police officers at all jurisdiction levels
  - name: Owners
    description: Registered tuk-tuk owners
  - name: Vehicles
    description: Registered tuk-tuks including location history and driver assignment history
  - name: Drivers
    description: Licensed tuk-tuk drivers
  - name: Tracking Devices
    description: GPS tracking devices installed in tuk-tuks
  - name: Location Pings
    description: GPS ping submission from tracking devices
  - name: Assignments
    description: Controller resources for assigning and unassigning drivers and devices

# ─────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT access token obtained from POST /auth/login.
        Expires after 15 minutes. Refresh using POST /auth/refresh.
    
    DeviceTokenAuth:
      type: apiKey
      in: header
      name: X-Device-Token
      description: >
        Firmware token issued to a tracking device at registration time.
        Format: FIRMTUKTUKXXXX (e.g. FIRMTUKTUK0001).
        Shown exactly once in the POST /tracking-devices response and must
        be securely recorded at provisioning. The raw token is never stored —
        only its HMAC-SHA256 hash is persisted in the database.
        Used exclusively on POST /location-pings.

# ─────────────────────────────────────────────────────────────
# REUSABLE SCHEMAS
# ─────────────────────────────────────────────────────────────
  schemas:

    # --- Generic response wrappers ---

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Resource retrieved successfully
        data:
          type: object
          description: The returned resource. Shape varies per endpoint.

    CollectionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Resources retrieved successfully
        collection:
          $ref: '#/components/schemas/PaginatedCollection'

    PaginatedCollection:
      type: object
      properties:
        href:
          type: string
          example: /tuktrack/v1/vehicles?offset=0&limit=10
        offset:
          type: integer
          example: 0
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 200
        first:
          type: string
          example: /tuktrack/v1/vehicles?offset=0&limit=10
        previous:
          type: string
          nullable: true
          example: null
        next:
          type: string
          nullable: true
          example: /tuktrack/v1/vehicles?offset=10&limit=10
        last:
          type: string
          example: /tuktrack/v1/vehicles?offset=190&limit=10
        count:
          type: integer
          example: 10
        items:
          type: array
          items:
            type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Resource not found

    # --- Domain schemas ---

    Province:
      type: object
      properties:
        province_id:
          type: string
          
          example: 11111111-0001-0001-0001-000000000001
        province_name:
          type: string
          example: Western Province
        province_code:
          type: string
          example: WP
        created_time:
          type: string
          format: date-time

    District:
      type: object
      properties:
        district_id:
          type: string
          
          example: 22222222-0001-0001-0001-000000000001
        province_id:
          type: string
          
        district_name:
          type: string
          example: Colombo
        district_code:
          type: string
          example: CMB
        created_time:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        role_id:
          type: string
          
        role_name:
          type: string
          enum:
            - HQ_SUPER_ADMIN
            - HQ_OFFICER
            - PROVINCIAL_HEAD
            - PROVINCIAL_OFFICER
            - DISTRICT_HEAD
            - DISTRICT_OFFICER
            - STATION_HEAD
            - STATION_OFFICER
        role_description:
          type: string
        user_management_scope:
          type: string
          enum: [NATIONAL, PROVINCIAL, DISTRICT, STATION, NONE]
        permissions:
          type: array
          items:
            type: string
          example:
            - vehicle:view
            - location:view_live
            - location:view_history

    Office:
      type: object
      properties:
        office_id:
          type: string
          
        office_code:
          type: string
          example: SLP-HQ-001
        office_name:
          type: string
          example: Sri Lanka Police Headquarters
        office_type:
          type: string
          enum: [HEADQUARTERS, PROVINCIAL_HQ, DISTRICT_HQ, DIVISIONAL_STATION]
        jurisdiction_type:
          type: string
          enum: [NATIONAL, PROVINCIAL, DISTRICT]
        jurisdiction_ref_id:
          type: string
          
          nullable: true
          description: >
            NULL for NATIONAL jurisdiction.
            province_id for PROVINCIAL.
            district_id for DISTRICT.
        office_address:
          type: string
          nullable: true
        office_contact:
          type: string
          nullable: true
          example: "0112-345678"
        status:
          type: string
          enum: [ACTIVE, CLOSED]
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    User:
      type: object
      properties:
        user_id:
          type: string
          
        username:
          type: string
          example: officer.silva
        fullname:
          type: string
          example: Kamal Bandara Silva
        email_address:
          type: string
          format: email
          example: k.silva@police.gov.lk
        badge_id:
          type: string
          example: SLP-12345
        contact_no:
          type: string
          nullable: true
        office_id:
          type: string
          
        role_id:
          type: string
          
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        last_login_time:
          type: string
          format: date-time
          nullable: true
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    Owner:
      type: object
      properties:
        owner_id:
          type: string
          
        owner_fullname:
          type: string
          example: Nimal Perera
        owner_identity_no:
          type: string
          description: Decrypted NIC, passport, or business registration number
          example: 901234567V
        owner_id_type:
          type: string
          enum: [NIC, PASSPORT, BUSINESS]
        owner_gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        owner_contact:
          type: string
          nullable: true
          description: Decrypted contact number
          example: "0771234567"
        owner_address:
          type: string
          nullable: true
          description: Decrypted address
          example: 45/B, Galle Road, Colombo 03
        status:
          type: string
          enum: [ACTIVE, INACTIVE, FLAGGED]
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    Vehicle:
      type: object
      properties:
        vehicle_id:
          type: string
          
        owner_id:
          type: string
          
        district_id:
          type: string
          
        device_id:
          type: string
          
          nullable: true
        license_plate_no:
          type: string
          example: WP CAB-1234
        chassis_number:
          type: string
          example: MA3FJEB1S00123456
        engine_number:
          type: string
          example: K10B1234567
        make_of_vehicle:
          type: string
          example: Bajaj
        model_of_vehicle:
          type: string
          example: RE 4S
        manufacture_year:
          type: integer
          example: 2021
        vehicle_colour:
          type: string
          nullable: true
          example: Yellow
        fuel_type:
          type: string
          enum: [PETROL, CNG, ELECTRIC]
        is_diplomatic:
          type: boolean
          example: false
        vehicle_reg_date:
          type: string
          format: date
          example: "2021-06-15"
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, FLAGGED, DEREGISTERED]
        district_name:
          type: string
          example: Colombo
        province_name:
          type: string
          example: Western Province
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    VehicleFullProfile:
      type: object
      description: Composite response — vehicle + owner + current driver + device
      properties:
        vehicle_id:
          type: string
          
        license_plate_no:
          type: string
        chassis_number:
          type: string
        engine_number:
          type: string
        make_of_vehicle:
          type: string
        model_of_vehicle:
          type: string
        manufacture_year:
          type: integer
        vehicle_colour:
          type: string
          nullable: true
        fuel_type:
          type: string
          enum: [PETROL, CNG, ELECTRIC]
        is_diplomatic:
          type: boolean
        vehicle_reg_date:
          type: string
          format: date
        status:
          type: string
        district_name:
          type: string
        province_name:
          type: string
        owner:
          $ref: '#/components/schemas/Owner'
        current_driver:
          $ref: '#/components/schemas/DriverAssignment'
          nullable: true
        device:
          type: object
          nullable: true
          properties:
            device_id:
              type: string
              
            device_serial_no:
              type: string
            device_status:
              type: string
              enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]

    Driver:
      type: object
      properties:
        driver_id:
          type: string
          
        driver_fullname:
          type: string
          example: Sunil Rathnayake
        driver_identity_no:
          type: string
          description: Decrypted NIC or passport number
          example: 851234567V
        driver_id_type:
          type: string
          enum: [NIC, PASSPORT]
        date_of_birth:
          type: string
          format: date
          example: "1985-04-12"
        driver_gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        driver_contact_no:
          type: string
          nullable: true
          description: Decrypted contact number
        address:
          type: string
          nullable: true
          description: Decrypted address
        driver_license_no:
          type: string
          description: Decrypted licence number
          example: B1234567
        license_expiry_date:
          type: string
          format: date
          example: "2027-03-31"
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, BLACKLISTED]
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    DriverAssignment:
      type: object
      description: A single entry in the driver assignment history for a vehicle
      properties:
        assignment_id:
          type: string
          
        vehicle_id:
          type: string
          
        driver_id:
          type: string
          
        driver_fullname:
          type: string
        driver_identity_no:
          type: string
          description: Decrypted
        driver_license_no:
          type: string
          description: Decrypted
        driver_status:
          type: string
          enum: [ACTIVE, SUSPENDED, BLACKLISTED]
        assigned_time:
          type: string
          format: date-time
        unassigned_time:
          type: string
          format: date-time
          nullable: true
        is_current_driver:
          type: boolean
        is_driver_owner:
          type: boolean

    TrackingDevice:
      type: object
      properties:
        device_id:
          type: string
          
        device_serial_no:
          type: string
          example: SLPGPS000001
        device_status:
          type: string
          enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    TrackingDeviceCreated:
      type: object
      description: >
        Returned only on POST /tracking-devices (device registration).
        Includes the plain-text firmware token exactly once — it cannot
        be retrieved again after this response. Record it immediately
        for device provisioning.
      properties:
        device_id:
          type: string
          format: uuid
          example: dddddddd-0001-0001-0001-000000000001
        device_serial_no:
          type: string
          example: SLPGPS000201
        device_status:
          type: string
          enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]
          example: ACTIVE
        device_token:
          type: string
          description: >
            Plain-text firmware token for this device. Format: FIRMTUKTUKXXXX.
            Shown once at registration — store it securely before closing this response.
            This field does not appear in any other endpoint response.
          example: FIRMTUKTUK0042
        created_time:
          type: string
          format: date-time
        updated_time:
          type: string
          format: date-time

    TrackingDeviceStatusComposite:
      type: object
      description: Device details combined with its assignment and most recent ping
      properties:
        device_id:
          type: string
          format: uuid
        device_serial_no:
          type: string
        device_status:
          type: string
          enum: [ACTIVE, INACTIVE, FAULTY, DECOMMISSIONED]
        assigned_vehicle:
          type: object
          nullable: true
          properties:
            vehicle_id:
              type: string
              format: uuid
            license_plate_no:
              type: string
            vehicle_status:
              type: string
        latest_ping:
          $ref: '#/components/schemas/LocationPing'
          nullable: true
        minutes_since_last_ping:
          type: integer
          nullable: true
          description: >
            How many whole minutes have elapsed since the most recent ping.
            Null if the device has never sent a ping.
          example: 4
        is_recently_active:
          type: boolean
          description: >
            True if a ping was received within the last 15 minutes.
            False if the most recent ping is older than 15 minutes.
            Null/false if the device has never sent a ping.
          example: true

    LocationPing:
      type: object
      properties:
        ping_id:
          type: string
          
        device_id:
          type: string
          
        latitude:
          type: number
          format: double
          example: 6.9271
        longitude:
          type: number
          format: double
          example: 79.8612
        ping_timestamp:
          type: string
          format: date-time
          example: "2025-04-26T10:30:00Z"
        speed_kmh:
          type: number
          format: double
          nullable: true
          example: 32.5
        device_battery:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          example: 74

    LastLocationResponse:
      type: object
      properties:
        vehicle_id:
          type: string
          
        license_plate_no:
          type: string
        device_id:
          type: string
          
        last_location:
          $ref: '#/components/schemas/LocationPing'

    AssignmentRecord:
      type: object
      properties:
        assignment_id:
          type: string
          
        vehicle_id:
          type: string
          
        driver_id:
          type: string
          
        assigned_time:
          type: string
          format: date-time
        unassigned_time:
          type: string
          format: date-time
          nullable: true
        is_current_driver:
          type: boolean
        is_driver_owner:
          type: boolean

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token valid for 15 minutes
        refresh_token:
          type: string
          description: Refresh token valid for 7 days

# ─────────────────────────────────────────────────────────────
# GLOBAL SECURITY — applied to all paths unless overridden
# ─────────────────────────────────────────────────────────────
security:
  - BearerAuth: []

# ─────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────
paths:

  # ============================================================
  # AUTH
  # ============================================================

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: >
        Authenticate with username and password.
        Returns a JWT access token (15 min) and a refresh token (7 days).
        No Bearer token required for this endpoint.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: officer.silva
                password:
                  type: string
                  format: password
                  example: SecurePass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many login attempts (auth rate limiter — 20 per 15 min)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: >
        Exchange a valid refresh token for a new access token.
        Token rotation is applied — the old refresh token is invalidated
        and a new one is issued on every call.
        No Bearer token required for this endpoint.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
        '400':
          description: Refresh token missing from request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: >
        Invalidates the current refresh token in the database.
        The access token will still be valid until its 15-minute expiry
        (stateless by design) but the refresh token cannot be used again.
        Requires a valid Bearer token.
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # PROVINCES
  # ============================================================

  /provinces:
    get:
      tags: [Provinces]
      summary: List all provinces
      description: >
        Returns all 9 Sri Lanka provinces.
        NATIONAL users see all. PROVINCIAL / DISTRICT / STATION users
        see only their own province.
      responses:
        '200':
          description: Provinces retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Province'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing province:view permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /provinces/{provinceId}:
    get:
      tags: [Provinces]
      summary: Get a province by ID
      parameters:
        - name: provinceId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Province found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Province'
        '403':
          description: Province is outside your jurisdiction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Province not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /provinces/{provinceId}/districts:
    get:
      tags: [Provinces]
      summary: List districts within a province
      parameters:
        - name: provinceId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Districts in province retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/District'
        '404':
          description: Province not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # DISTRICTS
  # ============================================================

  /districts:
    get:
      tags: [Districts]
      summary: List all districts
      description: Returns all 25 districts, jurisdiction-scoped.
      responses:
        '200':
          description: Districts retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/District'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /districts/{districtId}:
    get:
      tags: [Districts]
      summary: Get a district by ID
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: District found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/District'
        '404':
          description: District not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /districts/{districtId}/offices:
    get:
      tags: [Districts]
      summary: List offices within a district
      description: Requires both district:view and office:view permissions.
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Offices in district retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Office'
        '404':
          description: District not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # ROLES
  # ============================================================

  /roles:
    get:
      tags: [Roles]
      summary: List all roles
      description: Returns all 8 system roles with their permission arrays. Requires province:view.
      responses:
        '200':
          description: Roles retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CollectionResponse'
                  - type: object
                    properties:
                      collection:
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Role'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /roles/{roleId}:
    get:
      tags: [Roles]
      summary: Get a role by ID
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            
      responses:
        '200':
          description: Role found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Role'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Roles]
      summary: Update a role
      description: >
        Update role_description and/or permissions array.
        Requires audit:view permission — effectively restricted to HQ_SUPER_ADMIN.
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
