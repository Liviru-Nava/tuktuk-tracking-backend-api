              schema:
                $ref: '#/components/schemas/Owner'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /owners/{ownerIdentityNo}:
    get:
      tags: [Owners]
      summary: Get an owner by NIC / Passport / Business Reg. number
      description: |
        Requires owner:view. The service performs an HMAC-SHA256 blind-index lookup
        against owner_identity_no_hmac — the plain-text identity number is never
        used as a query predicate against the encrypted column directly.
      parameters:
        - name: ownerIdentityNo
          in: path
          required: true
          description: Plain-text NIC, passport, or business registration number
          schema:
            type: string
            example: "871234567V"
      responses:
        '200':
          description: Owner detail (PII decrypted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Owners]
      summary: Update an owner by NIC / Passport / Business Reg. number
      description: Requires owner:edit. Status FLAGGED indicates owner under investigation.
      parameters:
        - name: ownerIdentityNo
          in: path
          required: true
          schema:
            type: string
            example: "871234567V"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerUpdate'
      responses:
        '200':
          description: Owner updated
          content:
            application/json:
