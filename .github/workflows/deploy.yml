name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Clone if first time, otherwise pull
            if [ ! -d "/home/ubuntu/tuktuk-api" ]; then
              git clone git@github.com:Liviru-Nava/tuktuk-tracking-backend-api.git /home/ubuntu/tuktuk-api
            fi

            cd /home/ubuntu/tuktuk-api
            git pull origin main
            npm install

            # Write environment file
            cat > .env << 'ENVEOF'
            DB_HOST=${{ secrets.DB_HOST }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_PORT=${{ secrets.DB_PORT }}
            PORT=${{ secrets.PORT }}
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            REFRESH_TOKEN_EXPIRES_IN=${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS }}
            RATE_LIMIT_MAX=${{ secrets.RATE_LIMIT_MAX }}
            PASSWORD_HASH=${{ secrets.PASSWORD_HASH }}
            ENVEOF

            # Run migrations
            NODE_ENV=production npx knex migrate:latest --knexfile knexfile.js

            # Run seeds only if provinces table is empty
            PROVINCE_COUNT=$(NODE_ENV=production npx knex --knexfile knexfile.js seed:run 2>&1 || true)
            EXISTING=$(PGPASSWORD=${{ secrets.DB_PASSWORD }} psql \
              -h ${{ secrets.DB_HOST }} \
              -U ${{ secrets.DB_USER }} \
              -d ${{ secrets.DB_NAME }} \
              -t -c "SELECT COUNT(*) FROM provinces;" 2>/dev/null | tr -d ' ')

            if [ "$EXISTING" = "0" ] || [ -z "$EXISTING" ]; then
              echo "Database is empty. Running seeds..."
              node scripts/encrypt_users_seed.js
              node scripts/encrypt_owners_seed.js
              node scripts/encrypt_drivers_seed.js
              NODE_ENV=production npx knex seed:run --knexfile knexfile.js
              echo "Seeds completed."
            else
              echo "Database already has data. Skipping seeds."
            fi

            # Start or restart PM2
            if pm2 describe tuktuk-api > /dev/null 2>&1; then
              pm2 restart tuktuk-api
            else
              pm2 start src/server.js --name tuktuk-api
            fi

            pm2 save

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            curl -f http://localhost:3000/health && echo "Deployment successful" || echo "Health check failed"